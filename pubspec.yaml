name: library_mini_system
description: Library Management Mini System

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core Functionality
  crypt: ^4.1.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.5.3
  
  # Date & Localization (Added to fix your errors)
  intl: ^0.19.0

  # Firebase Suite
  firebase_core: ^2.30.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.6.5
  google_sign_in: ^6.2.1

  # Media & Hardware
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/library.png